const shuffleArray = (array) => {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
};

function loadSavedSession() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        state.savedSession = JSON.parse(saved);
    } else {
        state.savedSession = null;
    }
}

window.toggleSet = (setNum) => {
    if (state.selectedSets.includes(setNum)) {
        state.selectedSets = state.selectedSets.filter(n => n !== setNum);
    } else {
        state.selectedSets.push(setNum);
        state.selectedSets.sort((a, b) => a - b);
    }
    render();
};

window.selectAllSets = (bool) => {
    state.selectedSets = bool ? [...allSets] : [];
    render();
}

function prepareQuizData(filteredWords, mode) {
    return filteredWords.map(word => {
        const isEnToKo = mode === 'enToKo' || (mode === 'mixed' && Math.random() > 0.5);

        const questionText = isEnToKo ? word.en : word.ko;

          .filter(w => w.id !== word.id && (isEnToKo ? w.ko !== correctAnswer : w.en !== correctAnswer))
          .sort(() => 0.5 - Math.random())
          .slice(0, 3)
          .map(w => isEnToKo ? w.ko : w.en);

        const options = shuffleArray([correctAnswer, ...wrongOptions]);
        
        return {
            ...word,
            questionText,
            correctAnswer,
            isEnToKo,
            options,
            userAnswer: null // 초기에는 푼 상태가 아님
        };
    });
}

window.startQuiz = () => {
    if (state.selectedSets.length === 0) return;

    clearProgressSilent(); // 새로 시작하므로 기존 기록 삭제

    let filteredWords = WORD_DATA.filter(w => state.selectedSets.includes(w.set));
    if (state.isRandom) filteredWords = shuffleArray(filteredWords);

    state.quizList = prepareQuizData(filteredWords, state.quizMode);
    state.currentIndex = 0;
    state.view = 'quiz';
    
    render();
};

window.resumeQuiz = () => {
    if (!state.savedSession) return;
    
    state.quizList = state.savedSession.quizList;
    state.currentIndex = state.savedSession.currentIndex;
    state.selectedSets = state.savedSession.selectedSets;
    state.quizMode = state.savedSession.quizMode;
    state.isRandom = state.savedSession.isRandom;
    
    state.view = 'quiz';
    render();
};

window.saveProgress = () => {
    const sessionData = {
        quizList: state.quizList,
        currentIndex: state.currentIndex,
        selectedSets: state.selectedSets,
        quizMode: state.quizMode,
        isRandom: state.isRandom,
        timestamp: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionData));
    
    alert('현재 진행 상황이 저장되었습니다!');
    state.view = 'home';
    loadSavedSession();
    render();
};

window.clearProgress = () => {
    if(confirm('정말 저장된 학습 기록을 지우시겠습니까?')) {
        clearProgressSilent();
        render();
    }
};

function clearProgressSilent() {
    localStorage.removeItem(STORAGE_KEY);
    state.savedSession = null;
}

window.goToHome = () => {
    state.view = 'home';
    render();
};

window.downloadApp = () => {
    const htmlContent = '<!DOCTYPE html>\n<html lang="ko">\n' + document.documentElement.innerHTML + '\n</html>';
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '수능특강_VOCA_퀴즈앱_초록.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
};

// 정답 선택 시
window.selectOption = (optIndex) => {
    const currentWord = state.quizList[state.currentIndex];
    
    // 이미 답을 고른 상태(리뷰 중)라면 무시
    if (currentWord.userAnswer) return; 
    
    currentWord.userAnswer = currentWord.options[optIndex];
    render(); // 즉시 O/X 표시 업데이트

    // 1초 후 자동으로 다음으로 넘어가기
    clearTimeout(autoAdvanceTimeout);
    autoAdvanceTimeout = setTimeout(() => {
        if (state.currentIndex + 1 < state.quizList.length) {
            state.currentIndex++;
            render();
        } else {
            window.finishQuiz();
        }
    }, 1000);
};

// 네비게이션
window.prevQuestion = () => {
    clearTimeout(autoAdvanceTimeout);
    if (state.currentIndex > 0) {
        state.currentIndex--;
        render();
    }
};

window.nextQuestion = () => {
    clearTimeout(autoAdvanceTimeout);
    if (state.currentIndex + 1 < state.quizList.length) {
        state.currentIndex++;
        render();
    }
};

window.finishQuiz = () => {
    clearTimeout(autoAdvanceTimeout);
    clearProgressSilent(); // 다 풀었으므로 세션 삭제
    state.view = 'result';
    render();
};


// --- 5. UI 렌더링 템플릿 (초록색 테마) ---

        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 mx-5 border border-slate-100 shrink-0">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">

                    <button onclick="setQuizMode('koToEn')" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${state.quizMode === 'koToEn' ? 'bg-white shadow-sm text-teal-600' : 'text-slate-500'}">한 ➔ 영</button>

                    <button onclick="setIsRandom(true)" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${state.isRandom ? 'bg-white shadow-sm text-teal-600' : 'text-slate-500'}">랜덤 섞기</button>

function getQuizHTML() {
    const currentWord = state.quizList[state.currentIndex];
    if (!currentWord) return '';

    const progress = (state.currentIndex / state.quizList.length) * 100;

    let optionsHTML = currentWord.options.map((option, i) => {
        let btnClass = "w-full p-4 text-left rounded-2xl border-2 transition-all text-lg font-bold ";
        let iconHTML = "";
        let meaningHTML = "";
        
        if (!currentWord.userAnswer) {
            // 아직 아무 답도 고르지 않은 상태
            btnClass += "bg-white border-slate-100 text-slate-700 hover:border-teal-400 hover:bg-teal-50 shadow-sm";
        } else {
            // 리뷰 모드 혹은 정답 선택 직후
            
            // 각 보기의 반대 언어(원래 뜻) 찾기
            let optionMeaning = "";
            const matchedWord = WORD_DATA.find(w => currentWord.isEnToKo ? w.ko === option : w.en === option);
            if (matchedWord) {
                optionMeaning = currentWord.isEnToKo ? matchedWord.en : matchedWord.ko;
                meaningHTML = `<div class="text-sm font-medium mt-1 text-slate-400 break-words whitespace-normal text-left">${optionMeaning}</div>`;
            }

            if (option === currentWord.correctAnswer) {
                btnClass += "bg-emerald-50 border-emerald-500 text-emerald-800 shadow-sm";
                iconHTML = `<i class="fa-solid fa-circle-check text-emerald-500 text-xl shrink-0"></i>`;
                if(meaningHTML) meaningHTML = `<div class="text-sm font-medium mt-1 text-emerald-700 opacity-90 break-words whitespace-normal text-left">${optionMeaning}</div>`;
            } else if (option === currentWord.userAnswer) {
                btnClass += "bg-rose-50 border-rose-500 text-rose-800 shadow-sm";
                iconHTML = `<i class="fa-solid fa-circle-xmark text-rose-500 text-xl shrink-0"></i>`;
                if(meaningHTML) meaningHTML = `<div class="text-sm font-medium mt-1 text-rose-700 opacity-90 break-words whitespace-normal text-left">${optionMeaning}</div>`;
            } else {
                btnClass += "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
            }
        }

        return `
        <button ${currentWord.userAnswer ? 'disabled' : ''} onclick="selectOption(${i})" class="${btnClass}">
            <div class="flex justify-between items-center gap-3">
                <div class="flex-1 flex flex-col items-start">
                    <span class="break-words whitespace-normal text-left">${option}</span>
                    ${meaningHTML}
                </div>
                ${iconHTML}
            </div>
        </button>`;
    }).join('');

    const isLast = state.currentIndex === state.quizList.length - 1;
    const hasAnswered = !!currentWord.userAnswer;

    return `
    <div class="flex-1 flex flex-col p-6 overflow-y-auto bg-slate-50 custom-scrollbar pb-10">
        <!-- 상단 헤더 -->
        <div class="flex items-center justify-between mb-6 shrink-0">
            <button onclick="goToHome()" class="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-white hover:shadow-sm rounded-full transition-all border border-transparent hover:border-slate-200" title="저장하지 않고 홈으로">
                <i class="fa-solid fa-house"></i>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-slate-400 tracking-widest bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100">
                    <span class="text-teal-600">${state.currentIndex + 1}</span> / ${state.quizList.length}
                </span>
            </div>
            <button onclick="saveProgress()" 
                    class="flex items-center gap-1.5 px-3 py-2 bg-teal-100 hover:bg-teal-200 text-teal-800 rounded-xl text-sm font-bold transition-colors" title="현재 진행 상황 저장하기">
                <i class="fa-solid fa-floppy-disk"></i> 저장
            </button>
        </div>
        
        <div class="w-full bg-slate-200 rounded-full h-2 mb-8 overflow-hidden shrink-0">
            <div class="bg-teal-500 h-2 rounded-full transition-all duration-300 ease-out" style="width: ${progress}%"></div>
        </div>

        <div class="flex-1 flex flex-col justify-center mb-2 shrink-0">
            <div class="text-center mb-8 relative">
                <span class="absolute -top-6 left-1/2 -translate-x-1/2 inline-block px-3 py-1 bg-teal-600 text-white rounded-full text-xs font-bold shadow-sm whitespace-nowrap">
                    Set ${currentWord.set} (No. ${currentWord.id})
                </span>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mt-2 relative">
                    ${hasAnswered ? `<span class="absolute top-3 right-4 text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md border border-slate-200"><i class="fa-solid fa-eye text-teal-500"></i> 리뷰 중</span>` : ''}
                    <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-800 break-words leading-tight mt-2">
                        ${currentWord.questionText}
                    </h2>
                </div>
            </div>

            <div class="space-y-3">
                ${optionsHTML}
            </div>
        </div>

        <!-- 네비게이션 버튼 -->
        <div class="flex justify-between items-center mt-auto pt-6 gap-3 shrink-0">
            <button onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''} 
                    class="flex-1 py-3.5 px-4 rounded-xl font-extrabold flex items-center justify-center gap-2 transition-all ${state.currentIndex === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed opacity-50' : 'bg-white border-2 border-teal-200 text-teal-700 hover:bg-teal-50 shadow-sm'}">
                <i class="fa-solid fa-chevron-left"></i> 이전 단어
            </button>
            <button onclick="${isLast ? 'finishQuiz()' : 'nextQuestion()'}" ${!hasAnswered ? 'disabled' : ''} 
                    class="flex-1 py-3.5 px-4 rounded-xl font-extrabold flex items-center justify-center gap-2 transition-all ${!hasAnswered ? 'bg-slate-200 text-slate-400 cursor-not-allowed opacity-50' : 'bg-teal-600 text-white hover:bg-teal-700 shadow-md shadow-teal-600/20'}">
                ${isLast ? '결과 보기 <i class="fa-solid fa-flag-checkered"></i>' : '다음 단어 <i class="fa-solid fa-chevron-right"></i>'}
            </button>
        </div>
    </div>
    `;
}

function getResultHTML() {
    // 푼 문제들 기준으로 정답/오답 판별 (동적 계산)
    const answeredQuestions = state.quizList.filter(q => q.userAnswer);
    const correctQuestions = answeredQuestions.filter(q => q.userAnswer === q.correctAnswer);
    const wrongQuestions = answeredQuestions.filter(q => q.userAnswer !== q.correctAnswer);

    // 전체 문제 수 대비 맞은 비율
    const accuracy = Math.round((correctQuestions.length / state.quizList.length) * 100) || 0;
    
    let wrongHTML = '';
    if (wrongQuestions.length > 0) {
        const listHTML = wrongQuestions.map(item => `
            <div class="p-4 bg-slate-50 rounded-2xl mb-3 border border-slate-100">
                <div class="flex justify-between items-start mb-2">
                    <span class="font-extrabold text-lg text-slate-800">${item.en}</span>
                    <span class="text-[10px] font-bold px-2 py-1 bg-teal-100 text-teal-700 rounded-md">No. ${item.id}</span>
                </div>
                <p class="text-slate-600 font-medium mb-3">${item.ko}</p>
                <div class="bg-rose-100 text-rose-700 p-2.5 rounded-xl text-sm flex gap-2 font-bold items-center">
                    <i class="fa-solid fa-xmark opacity-70"></i>
                    <span class="whitespace-nowrap opacity-70">나의 선택:</span> 
                    <span>${item.userAnswer}</span>
                </div>
            </div>
        `).join('');

        wrongHTML = `
        <div class="bg-white rounded-3xl shadow-sm p-6 mb-8 border border-rose-100 mt-6 text-left relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1.5 h-full bg-rose-400"></div>
            <h3 class="text-lg font-bold text-rose-600 mb-5 flex items-center gap-2 pl-2">
                <i class="fa-solid fa-triangle-exclamation"></i> 오답 노트
            </h3>
            <div class="">
                ${listHTML}
            </div>
        </div>`;
    }

    return `
    <div class="flex-1 overflow-y-auto p-5 text-center bg-slate-50 custom-scrollbar h-full w-full">
        <div class="py-10 bg-white rounded-3xl shadow-sm border border-slate-100 mt-2 px-4">
            <div class="inline-flex items-center justify-center w-28 h-28 rounded-full bg-teal-50 text-teal-600 mb-6 shadow-inner border-4 border-teal-100 relative">
                <i class="fa-solid fa-ranking-star absolute -top-2 -right-2 text-3xl text-yellow-400 drop-shadow-md"></i>
                <span class="text-4xl font-black">${accuracy}<span class="text-xl text-teal-400 ml-1">%</span></span>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">수고하셨습니다!</h2>
            <p class="text-slate-500 font-medium mb-8">
                총 ${state.quizList.length}문제 중 <strong class="text-teal-600 text-xl mx-1">${correctQuestions.length}</strong>문제를 맞혔습니다.
            </p>

            <div class="flex flex-col gap-3">
                <button onclick="startQuiz()" class="w-full bg-white border-2 border-teal-500 text-teal-600 font-extrabold py-3.5 px-4 rounded-xl hover:bg-teal-50 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> 다시 풀기
                </button>
                <button onclick="goToHome()" class="w-full bg-teal-600 text-white font-extrabold py-3.5 px-4 rounded-xl hover:bg-teal-700 shadow-md shadow-teal-600/20 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-house"></i> 홈으로
                </button>
            </div>
        </div>
        ${wrongHTML}
    </div>
    `;
}

// --- 6. 초기화 및 렌더링 ---
function render() {
    const app = document.getElementById('app');
    if (state.view === 'home') app.innerHTML = getHomeHTML();
    else if (state.view === 'quiz') app.innerHTML = getQuizHTML();
    else if (state.view === 'result') app.innerHTML = getResultHTML();
}

window.addEventListener('DOMContentLoaded', () => {
    loadSavedSession();
    render();
});
</script>
